name: Tag From Manifest Version

on:
  push:
    branches:
      - "main"
    paths:
      - "custom_components/hidrograficopt/manifest.json"

permissions:
  contents: write

jobs:
  create-tag:
    name: "Create version tag"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version change
        id: version
        run: |
          FILE="custom_components/hidrograficopt/manifest.json"
          CURRENT_VERSION="$(jq -r '.version' "${FILE}")"

          if [[ -z "${CURRENT_VERSION}" || "${CURRENT_VERSION}" == "null" ]]; then
            echo "Manifest version is missing"
            exit 1
          fi

          PREVIOUS_VERSION="$(git show HEAD^:${FILE} 2>/dev/null | jq -r '.version' 2>/dev/null || true)"
          TAG="v${CURRENT_VERSION}"

          if [[ "${CURRENT_VERSION}" == "${PREVIOUS_VERSION}" ]]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git ls-remote --tags --refs origin "${TAG}" | grep -q .; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "version=${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"
